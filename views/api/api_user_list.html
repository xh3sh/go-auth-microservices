{{ define "api-user-list" }}
<div x-show="activeApiTab === 'list'" x-data="apiUserList">
    <button class="btn-submit" @click="fetchUsers()" :disabled="loading">
        <span x-show="!loading">Запросить список пользователей</span>
        <span x-show="loading">Загрузка...</span>
    </button>

    <div class="ui-cards-container" style="margin-top: 20px;">
        <template x-for="user in users" :key="user.id">
            <div class="ui-card card-user">
                <div class="ui-card-header">
                    <span class="ui-card-title" x-text="user.username"></span>
                    <span class="ui-card-badge">User</span>
                </div>
                <div class="ui-card-body">
                    <div class="ui-field">
                        <span class="ui-field-label">ID</span>
                        <span class="ui-field-value" x-text="user.id"></span>
                    </div>
                </div>
            </div>
        </template>
        
        <template x-if="users.length === 0 && !loading">
            <div style="grid-column: 1/-1; text-align: center; padding: 20px; color: #95a5a6;">
                Нажмите кнопку выше, чтобы загрузить пользователей
            </div>
        </template>
    </div>
</div>
{{ end }}
