<div class="ui-cards-container">
    {{ range .users }}
    <div class="ui-card card-user">
        <div class="ui-card-header">
            <span class="ui-card-title">{{ .Username }}</span>
            <span class="ui-card-badge">User</span>
        </div>
        <div class="ui-card-body">
            <div class="ui-field">
                <span class="ui-field-label">ID</span>
                <span class="ui-field-value">{{ .ID }}</span>
            </div>
        </div>
    </div>
    {{ else }}
    <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #95a5a6;">
        Пользователи не найдены
    </div>
    {{ end }}
</div>
