<div class="log-cards">
    {{ range .logs }}
    <div class="log-card service-{{ .Service }}">
        <div class="log-card-header">
            <span class="log-type">{{ .Type }}</span>
            <span class="log-service-badge">{{ .Service }}</span>
        </div>
        <div class="log-card-body">
            <div class="log-info-item">
                <span class="log-info-label">User ID:</span>
                <span class="log-info-value">{{ if .UserID }}{{ .UserID }}{{ else }}—{{ end }}</span>
            </div>
            <div class="log-data">{{ .Data }}</div>
        </div>
        <div class="log-timestamp">
            {{ .Timestamp.Format "02.01.2006 15:04:05" }}
        </div>
    </div>
    {{ else }}
    <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #95a5a6; background: #2c3e50; border-radius: 8px;">
        Логи не найдены
    </div>
    {{ end }}
</div>
